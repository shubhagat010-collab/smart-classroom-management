[build]
command = "cd frontend && npm install && npm run build"
publish = "frontend/build"

[build.environment]
NODE_VERSION = "18"

[[redirects]]
from = "/*"
to = "/index.html"
status = 200

[[headers]]
for = "/*"
[headers.values]
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/index.html"
[headers.values]
Cache-Control = "public, max-age=0"
