[build]\n  command = \"cd frontend && npm install && npm run build\"\n  publish = \"frontend/build\"\n\n[build.environment]\n  NODE_VERSION = \"18\"\n\n[[redirects]]\n  from = \"/*\"\n  to = \"/index.html\"\n  status = 200\n\n[[headers]]\n  for = \"/*\"\n  [headers.values]\n    Cache-Control = \"public, max-age=3600\"\n\n[[headers]]\n  for = \"/index.html\"\n  [headers.values]\n    Cache-Control = \"public, max-age=0\"\n